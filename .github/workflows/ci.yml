name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: soap, dom, zip, bcmath, openssl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint PHP sources
        run: find src test -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Smoke test
        run: php test/SmokeTest.php

      - name: PHPUnit
        run: vendor/bin/phpunit

      - name: PHPStan
        run: vendor/bin/phpstan analyse
